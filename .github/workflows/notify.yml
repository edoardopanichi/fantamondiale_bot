name: Notify World Cup Matches

on:
  schedule:
    # Europe/Amsterdam is UTC+2 during the June/July World Cup period.
    # Runs every 30 minutes from 12:07 through 23:37 local time, plus 00:07.
    # Offset from :00/:30 to reduce GitHub Actions scheduled-run congestion.
    - cron: "7,37 10-21 * * *"
    - cron: "7 22 * * *"
  workflow_dispatch:

concurrency:
  group: notify-world-cup-matches
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: Notify World Cup Matches
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          LINEUP_API_KEY: ${{ secrets.LINEUP_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
          TIMEZONE: Europe/Amsterdam
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m src.main --lookahead-hours 8 --manual-override --force-notifications
          else
            python -m src.main
          fi
      - name: Commit notification state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_notifications.json
          git diff --cached --quiet || git commit -m "Update sent notification state"
          git push
