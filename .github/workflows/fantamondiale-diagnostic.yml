name: Fantamondiale Diagnostic

on:
  push:
    branches:
      - codex/france-points-diagnostic
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    environment: Notify World Cup Matches
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compare France expected points
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_SECONDARY_KEY: ${{ secrets.ODDS_API_SECONDARY_KEY }}
          LINEUP_API_KEY: ${{ secrets.LINEUP_API_KEY }}
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
          TIMEZONE: Europe/Amsterdam
        run: |
          python - <<'PY'
          from argparse import Namespace
          from datetime import UTC, datetime

          import src.goalscorers as goalscorers
          from src.config import load_config
          from src.fantamondiale import canonical_team
          from src.lineup_provider import run_lineup_pipeline
          from src.matches import get_upcoming_matches
          from src.odds import (
              _fetch_odds_api_outcomes,
              _ranked_exact_scores_as_outcomes,
              run_exact_score_pipeline,
          )

          args = Namespace(
              dry_run=True,
              lookahead_hours=36,
              match_id=None,
              send_test_telegram=False,
              manual_override=True,
              force_notifications=False,
              save_dry_run=False,
          )
          config = load_config(args)
          now = datetime.now(UTC)
          matches = get_upcoming_matches(config, now=now)
          print(f"Now UTC: {now.isoformat()}")
          print("Matches:")
          for match in matches:
              print(f"- {match.id}: {match.home_team} vs {match.away_team} at {match.kickoff_time_utc.isoformat()}")

          match = next(
              (
                  item
                  for item in matches
                  if "Francia" in {canonical_team(item.home_team), canonical_team(item.away_team)}
              ),
              None,
          )
          if not match:
              raise SystemExit("No France match found in the 36-hour Actions lookahead window.")

          lineup_result = run_lineup_pipeline(config, match)
          exact_score_result = run_exact_score_pipeline(config, match)
          outcomes, sources, odds_error, tried = _fetch_odds_api_outcomes(
              config,
              match,
              config.goalscorer_markets + config.clean_sheet_markets + config.exact_score_markets,
          )
          if exact_score_result and not any(
              str(outcome.get("market_key") or "") in config.exact_score_markets for outcome in outcomes
          ):
              outcomes.extend(_ranked_exact_scores_as_outcomes(exact_score_result))
          if odds_error:
              print(f"Odds warning: {odds_error}")
          if not tried:
              raise SystemExit("No configured goalscorer market was available for this event.")

          def rank_with_expected_goal_transform(transform):
              original = goalscorers._expected_goals_from_anytime_probability
              goalscorers._expected_goals_from_anytime_probability = transform
              try:
                  return goalscorers.rank_goalscorers(
                      outcomes,
                      lineup_result=lineup_result,
                      match=match,
                      goalscorer_markets=set(config.goalscorer_markets),
                      clean_sheet_markets=set(config.clean_sheet_markets),
                      exact_score_markets={*config.exact_score_markets, "ranked_exact_score"},
                  )
              finally:
                  goalscorers._expected_goals_from_anytime_probability = original

          old_ranked = rank_with_expected_goal_transform(lambda probability: probability)
          new_ranked = goalscorers.rank_goalscorers(
              outcomes,
              lineup_result=lineup_result,
              match=match,
              goalscorer_markets=set(config.goalscorer_markets),
              clean_sheet_markets=set(config.clean_sheet_markets),
              exact_score_markets={*config.exact_score_markets, "ranked_exact_score"},
          )
          old_by_key = {(item.name, item.team): item for item in old_ranked}

          print(f"Selected match: {match.home_team} vs {match.away_team} ({match.kickoff_time_utc.isoformat()})")
          print(f"Lineup source: {lineup_result.source}")
          print(f"Odds sources: {', '.join(sorted(sources)) or 'The Odds API'}")
          print("name|team|bonus|probability|old_expected_points|new_expected_points|delta")
          for item in new_ranked[:6]:
              old = old_by_key.get((item.name, item.team))
              old_points = old.expected_points if old else item.probability * item.bonus
              print(
                  f"{item.name}|{item.team}|{item.bonus}|"
                  f"{item.probability:.6f}|{old_points:.6f}|{item.expected_points:.6f}|"
                  f"{item.expected_points - old_points:.6f}"
              )
          PY
